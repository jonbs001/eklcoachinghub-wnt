<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>Estonia WNT · Coaching Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#0b0f14;--s1:#111820;--s2:#182030;--s3:#1e2a3a;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);
  --t1:#f0f4f8;--t2:#8ca0be;--t3:#4a5a72;
  --gr:#1fba8a;--grd:rgba(31,186,138,.12);--grb:rgba(31,186,138,.3);
  --ac:#00c8e8;--acd:rgba(0,200,232,.1);--acb:rgba(0,200,232,.3);
  --pu:#8b72f0;--pud:rgba(139,114,240,.12);--pub:rgba(139,114,240,.3);
  --go:#f5a623;--god:rgba(245,166,35,.1);--gob:rgba(245,166,35,.3);
  --re:#e05555;--red:rgba(224,85,85,.1);--reb:rgba(224,85,85,.3);
  --am:#f0a030;--amd:rgba(240,160,48,.1);--amb:rgba(240,160,48,.3);
  --radius:10px;--radius-sm:6px;
  --font:'Inter',sans-serif;--font-title:'Bebas Neue',cursive;
  --sidebar:220px;--header:52px;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}
.light{
  --bg:#f0f4f8;--s1:#ffffff;--s2:#f5f7fa;--s3:#ebeff5;
  --b1:rgba(0,0,0,.06);--b2:rgba(0,0,0,.1);
  --t1:#1a2030;--t2:#4a5a72;--t3:#8ca0be;
}

/* ── RESET ──────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:10;transition:transform .25s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--header);background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:5}
#content{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar-brand{padding:16px;border-bottom:1px solid var(--b1)}
.brand-title{font-family:var(--font-title);font-size:20px;letter-spacing:.5px;color:var(--t1);line-height:1}
.brand-sub{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.nav-section{padding:10px 8px 4px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);margin:1px 6px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;user-select:none;border:none;background:none;width:calc(100% - 12px);text-align:left}
.nav-item:hover{background:var(--s2);color:var(--t1)}
.nav-item.active{background:var(--pud);color:var(--pu);border:1px solid var(--pub)}
.nav-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--re);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--b1);display:flex;gap:8px}

/* ── TOPBAR ──────────────────────────────────────────── */
#menu-btn{background:none;border:none;color:var(--t2);cursor:pointer;padding:6px;border-radius:var(--radius-sm);font-size:18px;display:none}
.page-title{font-family:var(--font-title);font-size:20px;letter-spacing:.5px;color:var(--t1)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);transition:background .3s}
.sync-dot.syncing{background:var(--go);animation:pulse 1s infinite}
.sync-dot.ok{background:var(--gr)}
.sync-dot.err{background:var(--re)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;border:1px solid var(--b2);background:var(--s2);color:var(--t2);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--s3);color:var(--t1)}
.btn-primary{background:var(--pu);border-color:var(--pu);color:#fff}
.btn-primary:hover{background:#7a62df;border-color:#7a62df;color:#fff}
.btn-green{background:var(--gr);border-color:var(--gr);color:#000}
.btn-green:hover{background:#18a87c;color:#000}
.btn-ghost{background:none;border-color:transparent}
.btn-ghost:hover{background:var(--s2)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-lg{padding:11px 20px;font-size:15px}
.btn-full{width:100%;justify-content:center}

/* ── CARDS ───────────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* ── GRID ────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* ── STAT TILES ─────────────────────────────────────── */
.stat-tile{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-family:var(--font-title);font-size:32px;letter-spacing:.5px;line-height:1;margin-bottom:3px}
.stat-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

/* ── TAGS ────────────────────────────────────────────── */
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;letter-spacing:.3px}
.tag-gr{background:var(--grd);color:var(--gr);border:1px solid var(--grb)}
.tag-ac{background:var(--acd);color:var(--ac);border:1px solid var(--acb)}
.tag-pu{background:var(--pud);color:var(--pu);border:1px solid var(--pub)}
.tag-go{background:var(--god);color:var(--go);border:1px solid var(--gob)}
.tag-re{background:var(--red);color:var(--re);border:1px solid var(--reb)}
.tag-am{background:var(--amd);color:var(--am);border:1px solid var(--amb)}
.tag-dim{background:var(--s2);color:var(--t3);border:1px solid var(--b1)}

/* ── BADGES ─────────────────────────────────────────── */
.role-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.role-ar{background:var(--acd);color:var(--ac);border:1px solid var(--acb)}
.role-bat{background:var(--grd);color:var(--gr);border:1px solid var(--grb)}
.role-bowl{background:var(--god);color:var(--go);border:1px solid var(--gob)}
.role-wk{background:var(--pud);color:var(--pu);border:1px solid var(--pub)}

/* ── INPUTS ──────────────────────────────────────────── */
input,textarea,select{background:var(--s2);border:1px solid var(--b2);color:var(--t1);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;padding:8px 12px;width:100%;transition:border-color .15s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--pu);box-shadow:0 0 0 2px var(--pud)}
label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.field{margin-bottom:12px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
textarea{resize:vertical;min-height:80px;line-height:1.6}

/* ── DIVIDERS ────────────────────────────────────────── */
.hr{border:none;border-top:1px solid var(--b1);margin:12px 0}

/* ── ALERTS ─────────────────────────────────────────── */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12.5px;line-height:1.5;margin-bottom:10px}
.alert-info{background:var(--acd);border:1px solid var(--acb);color:var(--ac)}
.alert-warn{background:var(--amd);border:1px solid var(--amb);color:var(--am)}
.alert-err{background:var(--red);border:1px solid var(--reb);color:var(--re)}
.alert-ok{background:var(--grd);border:1px solid var(--grb);color:var(--gr)}

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--s1);border-radius:14px 14px 0 0;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;transform:translateY(40px);transition:transform .25s;overflow:hidden}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-drag{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:10px auto 4px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.modal-title{font-family:var(--font-title);font-size:20px;letter-spacing:.5px}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px}
.modal-footer{padding:14px 18px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0}

/* ── PLAYER CARDS ────────────────────────────────────── */
.player-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;position:relative}
.player-card:hover{border-color:var(--pu);background:var(--s2)}
.player-card.inactive{opacity:.45;filter:grayscale(.7)}
.pc-name{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:4px}
.pc-meta{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.pc-stat{font-size:11px;color:var(--t3)}
.pc-notes{font-size:11.5px;color:var(--t2);line-height:1.55;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-flag{font-size:11px;color:var(--re);font-weight:500}
.pc-highlight{font-size:11px;color:var(--gr);font-weight:500}

/* ── SESSION HISTORY ─────────────────────────────────── */
.history-item{padding:10px 0;border-bottom:1px solid var(--b1)}
.history-item:last-child{border-bottom:none}
.history-date{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.history-title{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px}
.history-note{font-size:12.5px;color:var(--t1);line-height:1.6;background:var(--s2);border-left:2px solid var(--pu);padding:6px 10px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:4px;white-space:pre-wrap}
.history-pos{font-size:11.5px;color:var(--gr);margin-bottom:2px}
.history-neg{font-size:11.5px;color:var(--am);margin-bottom:2px}

/* ── SESSIONS TAB ────────────────────────────────────── */
.session-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.session-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.session-head:hover{background:var(--s2)}
.session-date{font-family:var(--font-title);font-size:18px;letter-spacing:.3px}
.session-type{font-size:11px;font-weight:500;color:var(--t3);padding:2px 8px;background:var(--s2);border-radius:3px}
.session-att{font-size:12px;color:var(--t2);margin-left:auto}
.session-body{display:none;padding:0 14px 12px}
.session-body.open{display:block}
.player-chip{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:3px;margin:2px;background:var(--s2);color:var(--t2);border:1px solid var(--b1)}
.player-chip.present{background:var(--grd);color:var(--gr);border-color:var(--grb)}
.player-chip.absent{background:var(--red);color:var(--re);border-color:var(--reb)}
.player-chip.partial{background:var(--amd);color:var(--am);border-color:var(--amb)}

/* ── TRAINING PLANS ──────────────────────────────────── */
.plan-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.plan-tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--b2);color:var(--t2);background:var(--s1);transition:all .15s}
.plan-tab.active{background:var(--pu);border-color:var(--pu);color:#fff}
.plan-tab.done{border-color:var(--grb);color:var(--gr)}
.rundown-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);position:relative}
.rundown-item:last-child{border-bottom:none}
.rundown-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.rd-rest{background:var(--t3)}.rd-field{background:var(--am)}.rd-bat{background:var(--ac)}.rd-bowl{background:var(--gr)}.rd-values{background:var(--pu)}
.rundown-time{font-size:10px;color:var(--t3);min-width:50px;flex-shrink:0;padding-top:1px}
.rundown-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}
.rundown-desc{font-size:12px;color:var(--t2);line-height:1.6;white-space:pre-wrap}

/* ── ATTENDANCE ──────────────────────────────────────── */
.att-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)}
.att-row:last-child{border-bottom:none}
.att-name{font-size:13px;font-weight:500;color:var(--t1);width:100px;flex-shrink:0}
.att-dots{display:flex;gap:3px}
.att-dot{width:18px;height:18px;border-radius:3px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.att-y{background:var(--grd);color:var(--gr);border:1px solid var(--grb)}
.att-n{background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.att-h{background:var(--amd);color:var(--am);border:1px solid var(--amb)}
.att-pct{font-size:12px;font-weight:600;margin-left:auto}

/* ── AGENT / TOOLS ───────────────────────────────────── */
#tools-layout{display:grid;grid-template-columns:1fr 380px;gap:14px;height:100%}
.chat-panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);display:flex;flex-direction:column;height:calc(100vh - 120px);overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:90%;padding:10px 13px;border-radius:var(--radius-sm);line-height:1.6;font-size:13px}
.chat-msg.user{background:var(--pud);border:1px solid var(--pub);color:var(--t1);align-self:flex-end;border-radius:var(--radius-sm) var(--radius-sm) 2px var(--radius-sm)}
.chat-msg.claude{background:var(--s2);border:1px solid var(--b1);color:var(--t1);align-self:flex-start;border-radius:2px var(--radius-sm) var(--radius-sm) var(--radius-sm)}
.chat-msg.system{background:var(--grd);border:1px solid var(--grb);color:var(--gr);font-size:12px;align-self:center;text-align:center}
.chat-msg.error{background:var(--red);border:1px solid var(--reb);color:var(--re);font-size:12px;align-self:center;text-align:center}
.chat-msg.thinking{background:var(--s2);border:1px solid var(--b1);color:var(--t3);font-size:12px;align-self:flex-start;animation:pulse 1.5s infinite}
.chat-input-area{padding:12px;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;resize:none;min-height:60px;max-height:160px;background:var(--s2);border:1px solid var(--b2);color:var(--t1);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-family:var(--font);line-height:1.5}
.chat-input:focus{border-color:var(--pu);outline:none}
.chat-actions{display:flex;gap:6px;flex-wrap:wrap}
.chat-chip{font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;background:var(--s2);border:1px solid var(--b2);color:var(--t2);transition:all .15s}
.chat-chip:hover{background:var(--pud);border-color:var(--pub);color:var(--pu)}
.preview-panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);display:flex;flex-direction:column;height:calc(100vh - 120px);overflow:hidden}
.preview-header{padding:12px 14px;border-bottom:1px solid var(--b1);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.preview-body{flex:1;overflow-y:auto;padding:14px}
.preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--t3);text-align:center}
.preview-empty .icon{font-size:40px;opacity:.4}
.diff-section{margin-bottom:14px}
.diff-section h4{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.diff-item{padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:5px;font-size:12.5px}
.diff-item.add{background:var(--grd);border:1px solid var(--grb)}
.diff-item.update{background:var(--acd);border:1px solid var(--acb)}
.diff-item.warn{background:var(--amd);border:1px solid var(--amb)}
.diff-item-name{font-weight:600;color:var(--t1);margin-bottom:3px}
.diff-item-detail{color:var(--t2);line-height:1.5}
.preview-footer{padding:12px 14px;border-top:1px solid var(--b1);display:flex;gap:8px;flex-shrink:0}

/* ── FITNESS ─────────────────────────────────────────── */
.fitness-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.fitness-row:last-child{border-bottom:none}
.fitness-rank{font-family:var(--font-title);font-size:18px;color:var(--t3);width:24px;text-align:center;flex-shrink:0}
.fitness-name{font-size:13px;font-weight:500;color:var(--t1);width:90px;flex-shrink:0}
.fitness-bar-wrap{flex:1;height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.fitness-bar{height:100%;background:var(--gr);border-radius:3px;transition:width .6s}
.fitness-time{font-size:13px;font-weight:600;color:var(--gr);width:50px;text-align:right;flex-shrink:0}
.fitness-trend{font-size:13px;width:20px;text-align:center;flex-shrink:0}

/* ── VALUES ─────────────────────────────────────────── */
.value-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.value-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer}
.value-icon{font-size:22px}
.value-title{font-size:16px;font-weight:600;color:var(--t1)}
.value-item{font-size:13px;color:var(--t2);padding:5px 0;border-bottom:1px solid var(--b1);line-height:1.5}
.value-item:last-child{border-bottom:none}
.value-item::before{content:'—';color:var(--t3);margin-right:8px}

/* ── HOME WIDGETS ────────────────────────────────────── */
.next-session-card{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--pub);border-radius:var(--radius);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.nsc-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--pu);margin-bottom:4px}
.nsc-title{font-family:var(--font-title);font-size:24px;letter-spacing:.5px;color:var(--t1);margin-bottom:3px}
.nsc-sub{font-size:13px;color:var(--t2)}
.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.qa-btn{background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.qa-btn:hover{border-color:var(--pu);background:var(--s2)}
.qa-icon{font-size:24px}
.qa-label{font-size:12px;font-weight:500;color:var(--t2)}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── MOBILE ──────────────────────────────────────────── */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);z-index:50}
  #sidebar.open{transform:translateX(0)}
  #menu-btn{display:block}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;display:none}
  #overlay.show{display:block}
  #content{padding:12px}
  #tools-layout{grid-template-columns:1fr;height:auto}
  .chat-panel,.preview-panel{height:60vh}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}
  .modal-sheet{max-height:96vh}
}

/* ── ANIMATIONS ──────────────────────────────────────── */
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SETTINGS PANEL ──────────────────────────────────── */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b1)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:13px;font-weight:500;color:var(--t1)}
.settings-desc{font-size:11px;color:var(--t3);margin-top:2px}
.toggle{width:40px;height:22px;background:var(--s2);border:1px solid var(--b2);border-radius:11px;cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--pu);border-color:var(--pu)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}
.toggle.on::after{left:20px}
</style>

let DB = null;

// ── INIT ─────────────────────────────────────────────────
async function init(){
  if(isLight) document.documentElement.classList.add('light');
  const cached = localStorage.getItem('wnt_v6_cache');
  if(cached){ try{ DB=JSON.parse(cached); renderPage(); }catch(e){ DB=JSON.parse(JSON.stringify(SEED)); } }
  else{ DB=JSON.parse(JSON.stringify(SEED)); renderPage(); }
  setSyncStatus('syncing');
  const fresh = await readBin();
  if(fresh){ DB=fresh; localStorage.setItem('wnt_v6_cache',JSON.stringify(DB)); renderPage(); setSyncStatus('ok'); }
  else setSyncStatus('err');
}

// ── JSONBIN ──────────────────────────────────────────────
async function readBin(){
  try{
    const r=await fetch(`${JSONBIN}/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'},cache:'no-store'});
    if(!r.ok) return null;
    const d=await r.json();
    return d && d.players ? d : null;
  }catch(e){ return null; }
}
async function writeBin(data){
  try{
    const r=await fetch(`${JSONBIN}/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){ return false; }
}
async function forceSync(){
  const btn=document.getElementById('sync-btn');
  if(btn) btn.classList.add('spin');
  setSyncStatus('syncing');
  const fresh=await readBin();
  if(fresh){ DB=fresh; localStorage.setItem('wnt_v6_cache',JSON.stringify(DB)); renderPage(); setSyncStatus('ok'); }
  else setSyncStatus('err');
  if(btn) btn.classList.remove('spin');
}
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  if(!dot) return;
  dot.className='sync-dot';
  if(s==='syncing') dot.classList.add('syncing');
  else if(s==='ok') dot.classList.add('ok');
  else if(s==='err') dot.classList.add('err');
}

const PAGE_TITLES = {home:'Home',squad:'Squad',sessions:'Sessions',plans:'Training Plans',attendance:'Attendance',fitness:'Fitness',values:'Values',tools:'Coach AI',settings:'Settings'};
function nav(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>{ if(el.textContent.trim().toLowerCase().replace(' ','').includes(page.replace('tools','coachai').replace('plans','plans'))) el.classList.add('active'); });
  document.getElementById('page-title').textContent = PAGE_TITLES[page]||page;
  renderPage();
  if(window.innerWidth<=768){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
}

  document.getElementById('sidebar').classList.toggle('open');

}

  btn.textContent=editMode?'✓ Done':'✏ Edit';

// ── RENDER ROUTER ────────────────────────────────────────
function renderPage(){
  if(!DB) return;
  const el=document.getElementById('content');
  el.innerHTML='';
  el.classList.add('fade-in');
  setTimeout(()=>el.classList.remove('fade-in'),300);
  switch(currentPage){
    case 'home':      renderHome(); break;
    case 'squad':     renderSquad(); break;
    case 'sessions':  renderSessions(); break;
    case 'plans':     renderPlans(); break;
    case 'attendance':renderAttendance(); break;
    case 'fitness':   renderFitness(); break;
    case 'values':    renderValues(); break;
    case 'tools':     renderTools(); break;
    case 'settings':  renderSettings(); break;
  }
}

    }).join('')}
  </div>`;
  document.getElementById('content').innerHTML=html;
}

// ── FITNESS ──────────────────────────────────────────────
function renderFitness(){
  const data=[...(DB.fitness||[])].sort((a,b)=>(a.bestSec||9999)-(b.bestSec||9999));
  const fastest=data[0]?.bestSec||600;
  let html=`<div class="card">
    <div class="card-title">2km leaderboard</div>
    ${data.map((f,i)=>{
      const barW=Math.round((fastest/f.bestSec)*100);
      const color=i===0?'var(--go)':i<=2?'var(--gr)':'var(--ac)';
      return `<div class="fitness-row">
        <div class="fitness-rank">${i+1}</div>
        <div class="fitness-name">${f.name}</div>
        <div class="fitness-bar-wrap"><div class="fitness-bar" style="width:${barW}%;background:${color}"></div></div>
        <div class="fitness-time" style="color:${color}">${f.best||'—'}</div>
        <div class="fitness-trend">${f.trend||'?'}</div>
      </div>`;
    }).join('')}
  </div>`;
  document.getElementById('content').innerHTML=html;
}

// ── COACH AI TOOLS ───────────────────────────────────────
function renderTools(){
  const hasKey=!!anthropicKey;
  let html=`<div id="tools-layout">
    <div class="chat-panel">
      <div style="padding:12px 14px;border-bottom:1px solid var(--b1);flex-shrink:0">
        <div style="font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px">💬 Coach AI</div>
        <div style="font-size:11px;color:var(--t3)">${hasKey?'Connected — type anything about your squad or session':'Add your Anthropic API key in Settings to enable AI coaching'}</div>
      </div>
      <div class="chat-messages" id="chat-messages">
        ${chatHistory.length===0?`<div class="chat-msg system">Session started. ${hasKey?'I know your full squad, all sessions and every player\'s history. Just talk.':'Add an API key in Settings to get started.'}</div>`:''}
        ${chatHistory.map(m=>`<div class="chat-msg ${m.role}">${m.content}</div>`).join('')}
      </div>
      <div class="chat-input-area">
        <div class="chat-actions">
          <div class="chat-chip" onclick="quickPrompt('Log today\\'s session notes')">📋 Log session</div>
          <div class="chat-chip" onclick="quickPrompt('Update player profiles from the last session')">👤 Update players</div>
          <div class="chat-chip" onclick="quickPrompt('Build a training plan for next session')">⚑ Build plan</div>
          <div class="chat-chip" onclick="quickPrompt('Attendance and fitness summary')">📊 Summary</div>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input" placeholder="Type session notes, ask about players, request a training plan..." onkeydown="chatKeydown(event)" rows="2"></textarea>
          <button class="btn btn-primary" onclick="sendChat()" id="chat-send" style="align-self:flex-end;padding:10px 16px"${hasKey?'':' disabled title="Add API key in Settings"'}>↑</button>
        </div>
      </div>
    </div>
    <div class="preview-panel">
      <div class="preview-header">
        <div style="font-size:13px;font-weight:600;color:var(--t1)">App preview</div>
        <div style="display:flex;gap:6px" id="preview-actions"></div>
      </div>
      <div class="preview-body" id="preview-body">
        <div class="preview-empty">
          <div class="icon">👁</div>
          <div style="font-size:13px;font-weight:500;color:var(--t2)">Changes preview</div>
          <div style="font-size:12px;color:var(--t3)">When Claude suggests updates, they'll appear here for review before going live</div>
        </div>

  document.getElementById('content').innerHTML=html;

function chatKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendChat(); }
}
function quickPrompt(text){
  const inp=document.getElementById('chat-input');
  if(inp){ inp.value=text; inp.focus(); }
}
function scrollChat(){
  const el=document.getElementById('chat-messages');
  if(el) el.scrollTop=el.scrollHeight;
}
function addChatMsg(role,content){
  chatHistory.push({role,content});
  const el=document.getElementById('chat-messages');
  if(!el) return;
  const div=document.createElement('div');
  div.className=`chat-msg ${role}`;
  div.textContent=content;
  el.appendChild(div);
  scrollChat();
}

async function sendChat(){
  if(!anthropicKey){ addChatMsg('error','Add your Anthropic API key in Settings first.'); return; }
  const inp=document.getElementById('chat-input');
  const text=inp?.value?.trim();
  if(!text) return;
  inp.value='';
  addChatMsg('user',text);
  const thinking=document.createElement('div');
  thinking.className='chat-msg thinking';
  thinking.textContent='Thinking…';
  document.getElementById('chat-messages').appendChild(thinking);
  scrollChat();

  // Build system prompt with full DB context
  const systemPrompt=buildSystemPrompt();
  // Build messages array
  const messages=[...chatHistory.slice(0,-1).map(m=>({role:m.role==='user'?'user':'assistant',content:m.content})),{role:'user',content:text}];

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:4000,system:systemPrompt,messages})
    });
    thinking.remove();
    if(!resp.ok){ const err=await resp.json(); addChatMsg('error',`API error: ${err.error?.message||resp.status}`); return; }
    const data=await resp.json();
    const reply=data.content?.[0]?.text||'No response';
    addChatMsg('claude',reply);
    // Try to extract and show patch
    extractAndPreviewPatch(reply);
  }catch(e){
    thinking.remove();
    addChatMsg('error',`Connection error: ${e.message}`);
  }
}

function buildSystemPrompt(){
  const players=(DB.players||[]).map(p=>`${p.name} (${p.roleLabel}${p.status==='inactive'?' — left squad':''}): bat="${p.bat?.notes?.substring(0,150)||'no notes'}", bowl="${p.bowl?.notes?.substring(0,150)||'no notes'}", field="${p.field?.notes?.substring(0,100)||'no notes'}", history=${p.history?.length||0} sessions logged`).join('\n');
  const sessions=(DB.sessions||[]).map(s=>`${s.date}: ${s.attendance} players, highlights: ${(s.highlights||[]).join(', ')||'none'}, concerns: ${(s.concerns||[]).join(', ')||'none'}`).join('\n');
  const att=(DB.attendance||[]).map(a=>{const y=a.att.filter(x=>x==='y').length;return `${a.name}: ${y}/${a.att.length} sessions`;}).join(', ');

  return `You are the coaching assistant for the Estonia Women's National Cricket Team (WNT), embedded directly in the coaching hub app. You have full access to the squad data, session history, and coaching notes below.

SQUAD (${(DB.players||[]).filter(p=>p.status!=='inactive').length} active players):
${players}

SESSION HISTORY (${(DB.sessions||[]).length} sessions):
${sessions}

ATTENDANCE OVERVIEW:
${att}

CURRENT TRAINING PLANS:
${(DB.trainingPlans||[]).map(p=>`${p.date} — ${p.title} (${p.status})`).join('\n')}

YOUR ROLE:
- You are Ben's coaching partner. You know every player, every session, every note.
- When asked to log a session, update player profiles, or build a training plan, produce a JSON patch block.
- JSON patches must be wrapped in triple backticks with the label "PATCH:" before them.
- Always provide full, detailed coaching notes — never summaries. The standard is professional coaching language with specific technical observations.
- When updating player history, each entry must include the date, full notes (not a summary), and highlights/concerns arrays.
- When asked questions (attendance trends, player comparisons, planning advice), answer conversationally first, then offer to update the app.
- You understand cricket coaching terminology and the specific needs of each player.

JSON PATCH FORMAT (when updating the app):
\`\`\`json
PATCH:
{
  "summary": "one sentence",
  "playerUpdates": [{"name":"PlayerName","fieldsToUpdate":{"history":[{"date":"DD Mon YYYY","type":"session","notes":"FULL detailed notes here","highlights":["name — specific positive"],"concerns":["name — specific concern"]}],"bat":{"notes":"full notes","tags":[]},"bowl":{"notes":"full notes","tags":[]},"field":{"notes":"full notes"}}}],
  "newSession": null,
  "newTrainingPlans": [],
  "newEvents": [],
  "fitnessUpdates": []
}
\`\`\`

COACHING STANDARDS:
- Session 1 theme: mental preparation (12 May)
- Session 2 theme: soft hands, hard work (17 May)
- Current focus: move your feet, make runs (24 May)
- Positive reinforcement is a cultural expectation — everyone builds each other up
- Selection prioritises players who show up and play regularly`;
}

function extractAndPreviewPatch(text){
  const match=text.match(/```json\s*PATCH:\s*([\s\S]*?)```/);
  if(!match) return;
  try{
    const raw=match[1].trim();
    const patch=JSON.parse(raw);
    pendingPatch=patch;
    showPreview(patch);
  }catch(e){
    console.warn('Could not parse patch',e);
  }
}

function showPreview(patch){
  const body=document.getElementById('preview-body');
  const actions=document.getElementById('preview-actions');
  if(!body) return;
  let html='';
  if(patch.newSession){
    const s=patch.newSession;
    html+=`<div class="diff-section"><h4>📅 New session</h4>
      <div class="diff-item add">
        <div class="diff-item-name">${s.date} — ${s.type}</div>
        <div class="diff-item-detail">${s.attendance||s.present?.length||0} players · ${s.overview||''}</div>
      </div></div>`;
  }
  if(patch.playerUpdates?.length){
    html+=`<div class="diff-section"><h4>👥 Player updates (${patch.playerUpdates.length})</h4>`;
    patch.playerUpdates.forEach(pu=>{
      const f=pu.fieldsToUpdate||{};
      const changes=[];
      if(f.history?.length) changes.push(`${f.history.length} session note${f.history.length>1?'s':''} added`);
      if(f.bat?.notes) changes.push('Batting notes');
      if(f.bowl?.notes) changes.push('Bowling notes');
      if(f.field?.notes) changes.push('Fielding notes');
      html+=`<div class="diff-item update">
        <div class="diff-item-name">${pu.name}</div>
        <div class="diff-item-detail">${changes.join(' · ')||'Updated'}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(patch.newTrainingPlans?.length){
    html+=`<div class="diff-section"><h4>⚑ Training plans</h4>`;
    patch.newTrainingPlans.forEach(p=>{ html+=`<div class="diff-item add"><div class="diff-item-name">${p.title}</div><div class="diff-item-detail">${p.date}</div></div>`; });
    html+=`</div>`;
  }
  if(patch.newEvents?.length){
    html+=`<div class="diff-section"><h4>🗓 Calendar events</h4>`;
    patch.newEvents.forEach(e=>{ html+=`<div class="diff-item add"><div class="diff-item-name">${e.day} ${e.month} — ${e.title}</div></div>`; });
    html+=`</div>`;
  }
  if(!html) html=`<div style="color:var(--t3);font-size:13px;padding:8px 0">No data changes in this response.</div>`;
  body.innerHTML=html;
  if(actions) actions.innerHTML=`<button class="btn btn-green btn-sm" onclick="applyPatch()">☁ Push live</button><button class="btn btn-sm" onclick="pendingPatch=null;document.getElementById('preview-body').innerHTML='<div class=preview-empty><div class=icon>👁</div></div>';document.getElementById('preview-actions').innerHTML=''">✕</button>`;
}

async function applyPatch(){
  if(!pendingPatch) return;
  const u=JSON.parse(JSON.stringify(DB));
  const p=pendingPatch;

  // Apply session
  if(p.newSession){ if(!u.sessions) u.sessions=[]; u.sessions.push({...p.newSession,id:'s'+Date.now()}); }

  // Apply player updates — field-level merge, history APPENDS
  (p.playerUpdates||[]).forEach(pu=>{
    const idx=(u.players||[]).findIndex(pl=>pl.name.toLowerCase().replace(/[^a-z]/g,'').includes(pu.name.toLowerCase().replace(/[^a-z]/g,'')));
    if(idx<0) return;
    const f=pu.fieldsToUpdate||{};
    if(f.history?.length){
      if(!u.players[idx].history) u.players[idx].history=[];
      f.history.forEach(h=>{ if(!u.players[idx].history.find(x=>x.date===h.date)) u.players[idx].history.push(h); });
    }
    if(f.bat?.notes!==undefined) u.players[idx].bat={...(u.players[idx].bat||{}),notes:f.bat.notes,tags:f.bat.tags||u.players[idx].bat?.tags||[]};
    if(f.bowl?.notes!==undefined) u.players[idx].bowl={...(u.players[idx].bowl||{}),notes:f.bowl.notes,tags:f.bowl.tags||u.players[idx].bowl?.tags||[]};
    if(f.field?.notes!==undefined) u.players[idx].field={...(u.players[idx].field||{}),notes:f.field.notes};
  });

  // Plans
  if(p.replaceAllPlans){ u.trainingPlans=p.newTrainingPlans||[]; }
  else{ (p.newTrainingPlans||[]).forEach(pl=>{ if(!u.trainingPlans) u.trainingPlans=[]; const i=u.trainingPlans.findIndex(x=>x.id===pl.id); i>=0?u.trainingPlans[i]=pl:u.trainingPlans.push(pl); }); }

  // Events
  (p.newEvents||[]).forEach(ev=>{ if(!u.events) u.events=[]; u.events.push({id:'e'+Date.now()+Math.random()|0,...ev}); });

  // Fitness
  (p.fitnessUpdates||[]).forEach(fu=>{ if(!u.fitness) u.fitness=[]; const i=u.fitness.findIndex(x=>x.name===fu.name); i>=0?u.fitness[i]={...u.fitness[i],...fu}:u.fitness.push(fu); });

  // Attendance auto-update
  if(p.newSession){ const s=p.newSession; (s.present||[]).forEach(n=>{ const ai=(u.attendance||[]).findIndex(a=>a.name===n); if(ai>=0) u.attendance[ai].att.push('y'); }); (s.partial||[]).forEach(n=>{ const ai=(u.attendance||[]).findIndex(a=>a.name===n); if(ai>=0) u.attendance[ai].att.push('h'); }); (s.absent||[]).forEach(n=>{ const ai=(u.attendance||[]).findIndex(a=>a.name===n); if(ai>=0) u.attendance[ai].att.push('n'); }); }

  u.meta={...u.meta,lastUpdated:new Date().toISOString()};
  setSyncStatus('syncing');
  const ok=await writeBin(u);
  if(ok){
    DB=u;
    localStorage.setItem('wnt_v6_cache',JSON.stringify(DB));
    pendingPatch=null;
    addChatMsg('system','✓ App updated and live for all staff');
    document.getElementById('preview-body').innerHTML='<div class="preview-empty"><div class="icon">✓</div><div style="color:var(--gr);font-size:13px;font-weight:500">Changes applied</div></div>';
    document.getElementById('preview-actions').innerHTML='';
    setSyncStatus('ok');
    renderPage();
  } else {
    addChatMsg('error','Push failed — check connection and try again');
    setSyncStatus('err');
  }
}
